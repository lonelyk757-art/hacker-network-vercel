<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Post - Hacker Network</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .create-container {
      max-width: 800px;
      margin: 0 auto;
      padding: var(--spacing-xl) var(--spacing-lg);
    }

    .create-header {
      margin-bottom: var(--spacing-2xl);
    }

    .create-header h1 {
      margin-bottom: var(--spacing-md);
    }

    .form-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--spacing-xl);
    }

    .post-type-selector {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-xl);
    }

    .type-option {
      background: transparent;
      border: 2px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      cursor: pointer;
      text-align: center;
      transition: all 0.3s ease;
      font-family: var(--font-mono);
      color: var(--text-secondary);
    }

    .type-option:hover {
      border-color: var(--primary-neon);
      color: var(--primary-neon);
    }

    .type-option.active {
      background: var(--primary-neon);
      border-color: var(--primary-neon);
      color: var(--darker-bg);
    }

    .type-icon {
      font-size: 2rem;
      margin-bottom: var(--spacing-sm);
      display: block;
    }

    .type-label {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-error {
      background: rgba(255, 0, 85, 0.1);
      border: 1px solid var(--accent-red);
      color: var(--accent-red);
      padding: var(--spacing-md);
      border-radius: var(--radius-md);
      margin-bottom: var(--spacing-lg);
      display: none;
    }

    .form-error.show {
      display: block;
    }

    .form-success {
      background: rgba(0, 255, 65, 0.1);
      border: 1px solid var(--primary-neon);
      color: var(--primary-neon);
      padding: var(--spacing-md);
      border-radius: var(--radius-md);
      margin-bottom: var(--spacing-lg);
      display: none;
    }

    .form-success.show {
      display: block;
    }

    .tag-selector {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
    }

    .tag-option {
      padding: var(--spacing-sm) var(--spacing-md);
      background: transparent;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .tag-option:hover {
      border-color: var(--primary-neon);
      color: var(--primary-neon);
    }

    .tag-option.selected {
      background: var(--primary-neon);
      border-color: var(--primary-neon);
      color: var(--darker-bg);
    }

    .image-upload {
      border: 2px dashed var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--spacing-xl);
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(0, 255, 65, 0.05);
    }

    .image-upload:hover {
      border-color: var(--primary-neon);
      background: rgba(0, 255, 65, 0.1);
    }

    .image-upload.dragover {
      border-color: var(--primary-neon);
      background: rgba(0, 255, 65, 0.15);
    }

    .image-preview {
      margin-top: var(--spacing-lg);
      max-width: 100%;
      max-height: 300px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
    }

    .preview-container {
      margin-top: var(--spacing-lg);
      display: none;
    }

    .preview-container.show {
      display: block;
    }

    .form-actions {
      display: flex;
      gap: var(--spacing-md);
      margin-top: var(--spacing-xl);
      justify-content: space-between;
    }

    .btn-submit {
      flex: 1;
    }

    .credit-info {
      background: rgba(0, 217, 255, 0.1);
      border: 1px solid var(--secondary-cyan);
      border-radius: var(--radius-md);
      padding: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
      font-size: 0.9rem;
      color: var(--secondary-cyan);
    }

    .loading {
      display: none;
      text-align: center;
      color: var(--primary-neon);
      font-family: var(--font-mono);
    }

    .loading.show {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(0, 255, 65, 0.3);
      border-top: 2px solid var(--primary-neon);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: var(--spacing-sm);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .post-type-selector {
        grid-template-columns: 1fr;
      }

      .form-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav>
    <div class="nav-container">
      <div class="nav-logo">⚡ HACKER NETWORK</div>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/feed.html">Feed</a></li>
      </ul>
      <div class="nav-user">
        <a href="/feed.html" class="btn btn-small">Back</a>
      </div>
    </div>
  </nav>

  <!-- Create Container -->
  <div class="create-container">
    <div class="create-header">
      <h1>Create New Post</h1>
      <p>Share your knowledge with the hacker community</p>
    </div>

    <div class="form-card">
      <div class="credit-info" id="creditInfo">
        ⭐ You have <strong id="creditAmount">0</strong> credits available
      </div>

      <div class="form-error" id="formError"></div>
      <div class="form-success" id="formSuccess"></div>

      <form id="createForm">
        <!-- Post Type Selection -->
        <div class="form-group">
          <label>Post Type</label>
          <div class="post-type-selector">
            <button type="button" class="type-option active" data-type="news">
              <span class="type-icon">📰</span>
              <span class="type-label">News</span>
            </button>
            <button type="button" class="type-option" data-type="blog">
              <span class="type-icon">📝</span>
              <span class="type-label">Blog</span>
            </button>
            <button type="button" class="type-option" data-type="image">
              <span class="type-icon">🖼️</span>
              <span class="type-label">Image</span>
            </button>
          </div>
          <input type="hidden" id="postType" value="news">
        </div>

        <!-- Title -->
        <div class="form-group">
          <label for="postTitle">Title</label>
          <input type="text" id="postTitle" name="title" required placeholder="Enter post title" maxlength="200">
        </div>

        <!-- Content -->
        <div class="form-group">
          <label for="postContent">Content</label>
          <textarea id="postContent" name="content" required placeholder="Write your post content here..."></textarea>
        </div>

        <!-- Image Upload (for image posts) -->
        <div class="form-group" id="imageUploadGroup" style="display: none;">
          <label>Upload Image</label>
          <div class="image-upload" id="imageUpload">
            <div style="font-size: 2rem; margin-bottom: var(--spacing-sm);">🖼️</div>
            <p>Drag and drop your image here or click to select</p>
            <p style="font-size: 0.8rem; color: var(--text-secondary);">Supported: JPG, PNG, GIF (Max 5MB)</p>
          </div>
          <div class="preview-container" id="previewContainer">
            <img id="imagePreview" class="image-preview" alt="Preview">
          </div>
          <input type="file" id="imageFile" accept="image/*" style="display: none;">
        </div>

        <!-- Tags -->
        <div class="form-group">
          <label>Topics (Select at least one)</label>
          <div class="tag-selector">
            <button type="button" class="tag-option" data-tag="cybersecurity">Cybersecurity</button>
            <button type="button" class="tag-option" data-tag="exploit">Exploit</button>
            <button type="button" class="tag-option" data-tag="tools">Tools</button>
            <button type="button" class="tag-option" data-tag="ctf">CTF</button>
            <button type="button" class="tag-option" data-tag="privacy">Privacy</button>
          </div>
          <input type="hidden" id="selectedTags" value="">
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
          <div class="spinner"></div>
          <span>Publishing post...</span>
        </div>

        <!-- Actions -->
        <div class="form-actions">
          <a href="/feed.html" class="btn btn-secondary">Cancel</a>
          <button type="submit" class="btn btn-submit" id="submitBtn">Publish Post</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script>
    let selectedType = 'news';
    let selectedTags = [];
    let uploadedImage = null;

    // Check authentication
    if (!HN.isAuthenticated()) {
      window.location.href = '/login.html';
    }

    // Update credit info
    function updateCreditInfo() {
      const user = HN.getCurrentUser();
      document.getElementById('creditAmount').textContent = user.credits || 0;
    }

    // Post type selection
    document.querySelectorAll('.type-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        document.querySelectorAll('.type-option').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedType = btn.dataset.type;
        document.getElementById('postType').value = selectedType;

        // Show/hide image upload for image posts
        const imageGroup = document.getElementById('imageUploadGroup');
        if (selectedType === 'image') {
          imageGroup.style.display = 'block';
          document.getElementById('postContent').required = false;
        } else {
          imageGroup.style.display = 'none';
          document.getElementById('postContent').required = true;
        }
      });
    });

    // Tag selection
    document.querySelectorAll('.tag-option').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        btn.classList.toggle('selected');
        
        selectedTags = Array.from(document.querySelectorAll('.tag-option.selected'))
          .map(b => b.dataset.tag);
        
        document.getElementById('selectedTags').value = selectedTags.join(',');
      });
    });

    // Image upload
    const imageUpload = document.getElementById('imageUpload');
    const imageFile = document.getElementById('imageFile');
    const imagePreview = document.getElementById('imagePreview');
    const previewContainer = document.getElementById('previewContainer');

    imageUpload.addEventListener('click', () => imageFile.click());

    imageUpload.addEventListener('dragover', (e) => {
      e.preventDefault();
      imageUpload.classList.add('dragover');
    });

    imageUpload.addEventListener('dragleave', () => {
      imageUpload.classList.remove('dragover');
    });

    imageUpload.addEventListener('drop', (e) => {
      e.preventDefault();
      imageUpload.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        handleImageSelect(files[0]);
      }
    });

    imageFile.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleImageSelect(e.target.files[0]);
      }
    });

    function handleImageSelect(file) {
      if (!file.type.startsWith('image/')) {
        HN.showNotification('Please select an image file', 'error');
        return;
      }

      if (file.size > 5 * 1024 * 1024) {
        HN.showNotification('Image must be smaller than 5MB', 'error');
        return;
      }

      uploadedImage = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        imagePreview.src = e.target.result;
        previewContainer.classList.add('show');
      };
      reader.readAsDataURL(file);
    }

    // Form submission
    document.getElementById('createForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const errorEl = document.getElementById('formError');
      const loadingEl = document.getElementById('loading');
      const submitBtn = document.getElementById('submitBtn');

      errorEl.classList.remove('show');

      // Validation
      if (selectedTags.length === 0) {
        errorEl.textContent = 'Please select at least one topic';
        errorEl.classList.add('show');
        return;
      }

      if (selectedType === 'image' && !uploadedImage) {
        errorEl.textContent = 'Please upload an image for image posts';
        errorEl.classList.add('show');
        return;
      }

      const title = document.getElementById('postTitle').value.trim();
      const content = document.getElementById('postContent').value.trim();

      if (!title || !content) {
        errorEl.textContent = 'Please fill in all required fields';
        errorEl.classList.add('show');
        return;
      }

      loadingEl.classList.add('show');
      submitBtn.disabled = true;

      try {
        let imageUrl = null;

        // Upload image if provided
        if (uploadedImage) {
          const uploadResult = await HN.uploadImage(uploadedImage);
          imageUrl = uploadResult.url;
        }

        // Create post
        const postData = {
          title,
          content,
          type: selectedType,
          tags: selectedTags,
          imageUrl,
        };

        const result = await HN.createPost(postData);

        HN.showNotification('Post published successfully!', 'success');
        
        // Update credits
        await HN.updateUserCredits();

        setTimeout(() => {
          window.location.href = `/post.html?id=${result.id}`;
        }, 1000);
      } catch (error) {
        errorEl.textContent = error.message || 'Failed to publish post';
        errorEl.classList.add('show');
        loadingEl.classList.remove('show');
        submitBtn.disabled = false;
      }
    });

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      updateCreditInfo();
    });
  </script>
</body>
</html>
